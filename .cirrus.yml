freebsd_instance:
  image_family: freebsd-15-0-amd64-ufs

freebsd_build_task:
  name: "FreeBSD Build and Test"

  install_script:
    - rm -f /var/db/pkg/*.sqlite
    - rm -rf /var/cache/pkg/*
    - pkg bootstrap -fy
    - mkdir -p /usr/local/etc/pkg/repos
    - "echo 'FreeBSD-ports: { enabled: no }' > /usr/local/etc/pkg/repos/FreeBSD-ports.conf"
    - "echo 'FreeBSD: { url: https://pkg.FreeBSD.org/${ABI}/latest }' > /usr/local/etc/pkg/repos/FreeBSD.conf"
    - pkg update -f
    - pkg install -y git cmake ninja pkgconf qt6-base qt6-declarative qt6-shadertools

  configure_script:
    - cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DVNM_QML_CHROME_BUILD_TESTS=ON -DVNM_QML_CHROME_BUILD_EXAMPLES=ON

  build_script:
    - cmake --build build --config Release

  test_script:
    - env QT_QPA_PLATFORM=offscreen QT_QUICK_CONTROLS_STYLE=Basic ctest --test-dir build --output-on-failure
