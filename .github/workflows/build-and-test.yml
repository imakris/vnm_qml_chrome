name: Build and test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / Qt ${{ matrix.qt-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt-version: 6.7.2
            qt-arch: linux_gcc_64
          - os: windows-latest
            qt-version: 6.7.2
            qt-arch: win64_msvc2019_64
          - os: macos-latest
            qt-version: 6.7.2
            qt-arch: clang_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          arch: ${{ matrix.qt-arch }}
          cache: true

      - name: Install offscreen platform dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon0 libegl1 libgl1 libdbus-1-3 libfontconfig1

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DVNM_QML_CHROME_BUILD_TESTS=ON
          -DVNM_QML_CHROME_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
          QT_QUICK_CONTROLS_STYLE: Basic
        run: ctest -C Release --output-on-failure
